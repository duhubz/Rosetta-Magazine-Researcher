name: Build Executables

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-13  # Apple Intel Macs
          - os: macos-14  # Apple Silicon Macs (M1/M2/M3)

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    # ---------------------------------------------
    # WINDOWS BUILD
    # ---------------------------------------------
    - name: Build Windows EXE
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --windowed --icon="rosettaicon.ico" --name "Rosetta Magazine Researcher" --add-data "app/templates;app/templates" --add-data "app/static;app/static" --collect-data certifi --collect-all fitz --hidden-import=yaml app.py

    - name: Upload Windows File
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/*.exe

    # ---------------------------------------------
    # MAC BUILD (Handles both Intel and Silicon)
    # ---------------------------------------------
    - name: Build Mac
      if: startsWith(matrix.os, 'macos')
      run: |
        pyinstaller --onefile --windowed --name "Rosetta_Magazine_Researcher" --add-data "app/templates:app/templates" --add-data "app/static:app/static" --collect-data certifi --collect-all fitz --hidden-import=yaml app.py
        
        cd dist
        # Rename the apps based on the OS runner so you know which is which
        if [ "${{ matrix.os }}" == "macos-13" ]; then
          mv Rosetta_Magazine_Researcher.app Rosetta_Mag_Researcher_Intel.app
          zip -r Rosetta_Mag_Researcher_Mac_Intel.zip Rosetta_Mag_Researcher_Intel.app
        else
          mv Rosetta_Magazine_Researcher.app Rosetta_Mag_Researcher_Silicon.app
          zip -r Rosetta_Mag_Researcher_Mac_Silicon.zip Rosetta_Mag_Researcher_Silicon.app
        fi

    - name: Upload Mac File
      if: startsWith(matrix.os, 'macos')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os == 'macos-13' && 'Mac-Intel-Executable' || 'Mac-Silicon-Executable' }}
        path: dist/*.zip

    # ---------------------------------------------
    # LINUX BUILD
    # ---------------------------------------------
    - name: Build Linux
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --onefile --windowed --name "Rosetta_Magazine_Researcher" --add-data "app/templates:app/templates" --add-data "app/static:app/static" --collect-data certifi --collect-all fitz --hidden-import=yaml app.py

    - name: Upload Linux File
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Linux-Executable
        path: dist/Rosetta_Magazine_Researcher