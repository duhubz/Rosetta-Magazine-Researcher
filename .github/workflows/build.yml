name: Build Executables

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-15-intel
          - os: macos-14

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    # ---------------------------------------------
    # WINDOWS BUILD
    # ---------------------------------------------
    - name: Build Windows EXE
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --windowed --icon="rosettaicon.ico" --name "Rosetta Magazine Researcher" --add-data "app/templates;app/templates" --add-data "app/static;app/static" --collect-data certifi --collect-all fitz --hidden-import=yaml app.py

    - name: Upload Windows File
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/*.exe

    # ---------------------------------------------
    # MAC BUILD
    # ---------------------------------------------
    - name: Build Mac
      if: startsWith(matrix.os, 'macos')
      run: |
        pip install --upgrade pyinstaller pyinstaller-hooks-contrib

        # Use --collect-submodules instead of --collect-all for fitz
        pyinstaller --onefile --windowed --clean \
          --name "Rosetta_Magazine_Researcher" \
          --add-data "app/templates:app/templates" \
          --add-data "app/static:app/static" \
          --collect-submodules fitz \
          --collect-data fitz \
          --collect-data certifi \
          --hidden-import=yaml \
          app.py
        
        cd dist
        # Check if the runner is Intel or Silicon based on the label
        if [[ "${{ matrix.os }}" == *"intel"* ]]; then
          mv Rosetta_Magazine_Researcher.app Rosetta_Mag_Researcher_Intel.app
          zip -r Rosetta_Mag_Researcher_Mac_Intel.zip Rosetta_Mag_Researcher_Intel.app
        else
          mv Rosetta_Magazine_Researcher.app Rosetta_Mag_Researcher_Silicon.app
          zip -r Rosetta_Mag_Researcher_Mac_Silicon.zip Rosetta_Mag_Researcher_Silicon.app
        fi

    - name: Upload Mac File
      if: startsWith(matrix.os, 'macos')
      uses: actions/upload-artifact@v4
      with:
        name: ${{ contains(matrix.os, 'intel') && 'Mac-Intel-Executable' || 'Mac-Silicon-Executable' }}
        path: dist/*.zip

    # ---------------------------------------------
    # LINUX BUILD
    # ---------------------------------------------
    - name: Build Linux
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --onefile --windowed --name "Rosetta_Magazine_Researcher" --add-data "app/templates:app/templates" --add-data "app/static:app/static" --collect-data certifi --collect-all fitz --hidden-import=yaml app.py

    - name: Upload Linux File
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Linux-Executable
        path: dist/Rosetta_Magazine_Researcher